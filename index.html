<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Typing Shooter</title>

<style>
* {
    box-sizing: border-box;
}

body {
    margin: 0;
    font-family: Arial;
    overflow: hidden;
    background: linear-gradient(180deg, #020024, #090979, #00d4ff);
    color: white;
}

/* screens */
.screen {
    position: absolute;
    width: 100%;
    height: 100%;
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    z-index: 10;
    background: rgba(0,0,0,0.8);
}

button {
    padding: 15px 25px;
    font-size: 18px;
    border-radius: 30px;
    border: none;
    background: linear-gradient(45deg, cyan, blue);
    color: white;
}

/* game area */
#gameArea {
    width: 100%;
    height: 100vh;
    position: relative;
}

/* word */
.word {
    position: absolute;
    font-size: 24px;
    font-weight: bold;
    color: #00ffff;
    text-shadow: 0 0 10px cyan;
    animation: fall linear forwards;
}

@keyframes fall {
    from { top: -50px; }
    to { top: 100%; }
}

/* UI */
#score, #lives {
    position: absolute;
    font-size: 16px;
    background: rgba(0,0,0,0.4);
    padding: 8px 12px;
    border-radius: 20px;
}

#score { top: 10px; left: 10px; }
#lives { top: 10px; right: 10px; }

/* input */
#inputBox {
    position: absolute;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    width: 90%;
    padding: 15px;
    font-size: 18px;
    border-radius: 30px;
    border: none;
    outline: none;
}

/* explosion */
.explode {
    color: red !important;
    transform: scale(1.5);
    transition: 0.2s;
}

</style>
</head>

<body>

<!-- START -->
<div id="startScreen" class="screen">
    <h1>🚀 Typing Shooter</h1>
    <button id="startBtn">Start Game</button>
</div>

<!-- GAME OVER -->
<div id="gameOverScreen" class="screen" style="display:none;">
    <h1>💀 Game Over</h1>
    <p id="finalScore"></p>
    <button onclick="location.reload()">Restart</button>
</div>

<!-- GAME -->
<div id="gameArea">
    <div id="score">Score: 0</div>
    <div id="lives">❤️❤️❤️</div>
    <input id="inputBox" placeholder="Type word..." />
</div>

<script>

let score = 0;
let lives = 3;
let running = false;

const words = [
"cat","dog","sun","pen","car","bat","cup","hat","map","box",
"tree","milk","book","star","moon","fish","door","ring","road","ball",
"html","code","game","java","play","fire","rock","data","test","user",
"input","output","logic","array","loop","class","object","method","value","print",
"javascript","developer","computer","keyboard","program"
];

const input = document.getElementById("inputBox");

// start
document.getElementById("startBtn").addEventListener("click", ()=>{
    document.getElementById("startScreen").style.display="none";
    running = true;
    input.focus();
    createWord();
});

// create word
function createWord(){

    if(!running) return;

    if(document.querySelector(".word")) return;

    const word = document.createElement("div");
    word.className="word";

    let text = words[Math.floor(Math.random()*words.length)];
    word.innerText=text;

    word.style.left=Math.random()*80+"%";

    let speed = 5;
    word.style.animationDuration=speed+"s";

    gameArea.appendChild(word);

    setTimeout(()=>{
        if(gameArea.contains(word)){
            word.remove();
            lives--;
            document.getElementById("lives").innerText="❤️".repeat(lives);

            if(lives<=0){
                gameOver();
                return;
            }
        }
        createWord();
    }, speed*1000);
}

// typing
input.addEventListener("input", ()=>{
    let typed = input.value.trim();
    let word = document.querySelector(".word");

    if(word && typed === word.innerText){
        word.classList.add("explode");

        setTimeout(()=>word.remove(),200);

        score++;
        document.getElementById("score").innerText="Score: "+score;

        input.value="";
        setTimeout(createWord,400);
    }
});

// game over
function gameOver(){
    running=false;
    document.getElementById("gameOverScreen").style.display="flex";
    document.getElementById("finalScore").innerText="Score: "+score;
}

</script>

</body>
</html>
