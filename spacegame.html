<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Typing Game</title>

<style>
body {
    margin: 0;
    overflow: hidden;
    background: black;
    color: white;
    font-family: Arial;
}

/* screens */
#startScreen, #gameOverScreen {
    position: absolute;
    width: 100%;
    height: 100%;
    background: black;
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    z-index: 10;
}

button {
    padding: 12px;
    font-size: 18px;
    border-radius: 10px;
    border: none;
    background: cyan;
    cursor: pointer;
}

/* game */
#gameArea {
    width: 100%;
    height: 100vh;
    position: relative;
}

.word {
    position: absolute;
    font-size: 26px;
    color: cyan;
    animation: fall linear forwards;
}

@keyframes fall {
    from { top: -50px; }
    to { top: 100%; }
}

#score { position: absolute; top: 10px; left: 10px; }
#lives { position: absolute; top: 10px; right: 10px; }

input {
    position: absolute;
    bottom: 20px;
    width: 90%;
    left: 5%;
    padding: 10px;
    font-size: 18px;
    border-radius: 10px;
    border: none;
}
</style>
</head>

<body>

<!-- START -->
<div id="startScreen">
    <h1>🚀 Typing Game</h1>
    <button id="startBtn">Start Game</button>
</div>

<!-- GAME OVER -->
<div id="gameOverScreen" style="display:none;">
    <h1>💀 Game Over</h1>
    <p id="finalScore"></p>
    <button onclick="location.reload()">Restart</button>
</div>

<!-- GAME -->
<div id="gameArea">
    <div id="score">Score: 0</div>
    <div id="lives">Lives: ❤️❤️❤️</div>
    <input id="inputBox" placeholder="Type word..." />
</div>

<script>

let score = 0;
let lives = 3;
let gameRunning = false;

const words = [
"cat","dog","sun","pen","car","bat","cup","hat","map","box",
"tree","milk","book","star","moon","fish","door","ring","road","ball",
"html","code","game","java","play","fire","rock","data","test","user",
"input","output","logic","array","loop","class","object","method","value","print",
"javascript","developer","computer","keyboard","program"
];

const gameArea = document.getElementById("gameArea");
const input = document.getElementById("inputBox");

// start button fix
document.getElementById("startBtn").addEventListener("click", startGame);

// start game
function startGame(){
    document.getElementById("startScreen").style.display="none";
    gameRunning = true;

    input.focus(); // mobile fix

    createWord();
}

// create word
function createWord(){

    if(!gameRunning) return;

    if(document.querySelector(".word")) return;

    const word = document.createElement("div");
    word.classList.add("word");

    let text = words[Math.floor(Math.random()*words.length)];
    word.innerText = text;

    word.style.left = Math.random()*80 + "%";

    let speed = 6;
    word.style.animationDuration = speed + "s";

    gameArea.appendChild(word);

    setTimeout(()=>{
        if(gameArea.contains(word)){
            word.remove();

            lives--;
            document.getElementById("lives").innerText =
                "Lives: " + "❤️".repeat(lives);

            if(lives<=0){
                gameOver();
                return;
            }
        }
        createWord();
    }, speed*1000);
}

// typing
input.addEventListener("input", ()=>{
    let typed = input.value.trim();

    const word = document.querySelector(".word");

    if(word && word.innerText === typed){

        word.innerText="💥";
        setTimeout(()=>word.remove(),200);

        score++;
        document.getElementById("score").innerText =
            "Score: "+score;

        input.value="";
        setTimeout(createWord,500);
    }
});

// game over
function gameOver(){
    gameRunning = false;
    document.getElementById("gameOverScreen").style.display="flex";
    document.getElementById("finalScore").innerText =
        "Score: " + score;
}

</script>

</body>
</html>
